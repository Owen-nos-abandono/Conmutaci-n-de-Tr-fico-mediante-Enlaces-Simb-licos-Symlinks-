name: Deploy Nginx Blue-Green (Symlinks)

on:
  push:
    branches:
      - main

jobs:
  deploy-via-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ejecutar Cambio de Enlace en VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Ejecutamos el script que ya creaste en la VM
            # Puedes cambiar 'green' por 'blue' según lo que quieras desplegar
            ~/switch_link.sh green
